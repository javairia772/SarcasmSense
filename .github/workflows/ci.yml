name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic httpx pytest

      - name: Lint check
        run: python -m py_compile api/main.py api/model.py

      - name: Test API schema
        run: |
          python -c "
          from fastapi.testclient import TestClient
          import sys, os
          sys.path.insert(0, '.')
          # Patch model loader so no HF download needed in CI
          import api.model as m
          m._classifier = lambda text, **kw: [{'label': 'LABEL_0', 'score': 0.95}]
          from api.main import app
          client = TestClient(app)
          r = client.get('/health')
          assert r.status_code == 200
          print('✅ Health check passed')
          r2 = client.get('/')
          assert r2.status_code == 200
          print('✅ Root endpoint passed')
          "
